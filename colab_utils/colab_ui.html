<style>
    :root {
        --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --primary-color: #007aff;
        --bg-color: #f5f5f7;
        --surface-color: #ffffff;
        --border-color: #e5e5ea;
        --text-primary: #1d1d1f;
        --text-secondary: #8e8e93;
        --user-bubble: #007aff;
        --bot-bubble: #e5e5ea;
    }

    body {
        margin: 0;
        background-color: var(--bg-color);
        padding: 20px;
    }

    #chat-root {
        max-width: 800px;
        margin: 0 auto;
        font-family: var(--font-family);
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        display: flex;
        flex-direction: column;
        height: 75vh;
        min-height: 600px;
    }

    .chat-header {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(10px);
        color: var(--text-primary);
        padding: 16px 20px;
        font-size: 17px;
        font-weight: 600;
        text-align: center;
        border-bottom: 1px solid var(--border-color);
        z-index: 10;
    }

    #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        scroll-behavior: smooth;
    }

    #chat-box::-webkit-scrollbar {
        width: 8px;
    }

    #chat-box::-webkit-scrollbar-thumb {
        background-color: #d1d1d6;
        border-radius: 10px;
    }

    .message-wrapper {
        display: flex;
        margin-bottom: 16px;
        animation: fadeIn 0.3s ease-in-out;
    }

    .message-bubble {
        max-width: 72%;
        padding: 12px 16px;
        font-size: 15px;
        line-height: 1.4;
    }

    .message-user {
        justify-content: flex-end;
    }

    .message-user .message-bubble {
        background: var(--user-bubble);
        color: white;
        border-radius: 20px 20px 4px 20px;
    }

    .message-bot {
        justify-content: flex-start;
    }

    .message-bot .message-bubble {
        background: var(--bot-bubble);
        color: var(--text-primary);
        border-radius: 20px 20px 20px 4px;
    }

    .welcome-card {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 24px;
        margin: 10px auto 24px;
        max-width: 85%;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        animation: fadeIn 0.4s ease-in-out;
    }

    .welcome-card h3 {
        margin: 0 0 10px 0;
        font-size: 18px;
        color: var(--text-primary);
    }

    .welcome-card p {
        margin: 0 0 20px 0;
        font-size: 15px;
        color: var(--text-secondary);
    }

    .features-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
    }

    .feature-item {
        background: var(--bg-color);
        padding: 12px;
        border-radius: 14px;
        font-size: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
    }

    .feature-item span {
        font-size: 20px;
    }

    .feature-item strong {
        color: var(--text-primary);
    }

    .feature-item small {
        color: var(--text-secondary);
        font-size: 12px;
    }

    .welcome-prompt {
        font-weight: 600;
        color: var(--primary-color);
        margin: 0;
    }

    .chat-input-area {
        display: flex;
        gap: 10px;
        padding: 16px 20px;
        background: var(--surface-color);
        border-top: 1px solid var(--border-color);
    }

    #user-input {
        flex: 1;
        padding: 14px 18px;
        border: 1px solid var(--border-color);
        border-radius: 24px;
        font-size: 15px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
    }

    #user-input:focus {
        border-color: var(--primary-color);
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 24px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        font-family: inherit;
    }

    .btn:hover {
        opacity: 0.85;
    }

    .btn:active {
        transform: scale(0.96);
    }

    .btn-send {
        background: var(--primary-color);
        color: white;
    }

    .btn-reset {
        background: #ff3b30;
        color: white;
    }

    #loading {
        display: none;
        padding: 0 20px 16px;
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 500;
        text-align: center;
        animation: pulse 1.5s infinite;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
    }
</style>

<div id="chat-root">
    <div class="chat-header">
        Aquatic Center Chatbot
    </div>

    <div id="chat-box"></div>

    <div id="loading">Bot is generating...</div>

    <div class="chat-input-area">
        <input id="user-input" type="text" placeholder="Write a message..." autocomplete="off" />
        <button class="btn btn-send" onclick="sendMessage()">Send</button>
        <button class="btn btn-reset" onclick="resetChat()">New Chat</button>
        <button class="btn btn-demo-reset" onclick="restartDemo()">Restart Demo</button>
    </div>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const input = document.getElementById("user-input");
const loading = document.getElementById("loading");

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

function addMessage(role, text) {
    const wrapper = document.createElement("div");
    wrapper.className = "message-wrapper " + (role === "user" ? "message-user" : "message-bot");

    const bubble = document.createElement("div");
    bubble.className = "message-bubble";
    bubble.innerHTML = escapeHtml(text).replace(/\\n/g, "<br>");

    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function addWelcomeMessage() {
    const welcomeHtml = `
        <div class="welcome-card">
            <h3>👋 Welcome to the Aquatic Center!</h3>
            <p>I'm your virtual assistant. Here is what I can help you with:</p>
            <div class="features-grid">
                <div class="feature-item">
                    <span>📅</span>
                    <strong>Bookings</strong>
                    <small>Spa & Courses</small>
                </div>
                <div class="feature-item">
                    <span>🕒</span>
                    <strong>Information</strong>
                    <small>Hours, Prices & Rules</small>
                </div>
                <div class="feature-item">
                    <span>🛍️</span>
                    <strong>Shop</strong>
                    <small>Buy Equipment</small>
                </div>
                <div class="feature-item">
                    <span>🔍</span>
                    <strong>Lost & Found</strong>
                    <small>Report lost items</small>
                </div>
            </div>
            <p class="welcome-prompt">How can I help you today?</p>
        </div>
    `;
    chatBox.insertAdjacentHTML("beforeend", welcomeHtml);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function extractResponse(result) {
    const data = result && result.data ? result.data : {};

    if (data["application/json"]) {
        const payload = data["application/json"];

        if (typeof payload === "object" && payload.response !== undefined) {
            return payload.response;
        }

        if (typeof payload === "string") {
            try {
                const parsed = JSON.parse(payload);
                if (parsed.response !== undefined) {
                    return parsed.response;
                }
            } catch (error) {
                return payload;
            }
        }
        return String(payload);
    }

    if (data["text/plain"]) {
        let text = String(data["text/plain"]);

        const match = text.match(/['"]response['"]\s*:\s*(['"])([\s\S]*?)\1\s*\}/);
        if (match) return match[2];

        return text;
    }

    return "Error: unexpected response format from Python callback.";
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    addMessage("user", message);
    loading.style.display = "block";

    try {
        const result = await google.colab.kernel.invokeFunction(
            "notebook.send_message_to_bot",
            [message],
            {}
        );
        addMessage("bot", extractResponse(result));
    } catch (error) {
        addMessage("bot", "Error: " + error);
    } finally {
        loading.style.display = "none";
    }
}

async function resetChat() {
    chatBox.innerHTML = "";
    loading.style.display = "block";

    try {
        await google.colab.kernel.invokeFunction(
            "notebook.reset_bot_state",
            [],
            {}
        );
        addWelcomeMessage();
    } catch (error) {
        addMessage("bot", "Error: " + error);
    } finally {
        loading.style.display = "none";
    }
}

async function restartDemo() {
    const confirmed = confirm(
        "This will restore the initial demo data and clear the current conversation. Continue?"
    );

    if (!confirmed) return;

    chatBox.innerHTML = "";
    loading.style.display = "block";

    try {
        await google.colab.kernel.invokeFunction(
            "notebook.restart_demo",
            [],
            {}
        );
        addWelcomeMessage();
    } catch (error) {
        addMessage("bot", "Error: " + error);
    } finally {
        loading.style.display = "none";
    }
}

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});

addWelcomeMessage();
</script>
